name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      dllName: RockTheVote

    steps:
      - uses: actions/checkout@v5

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RockTheVote.csproj

      - name: Build
        run: dotnet publish RockTheVote.csproj -c Release -o publish --no-restore

      - name: Create zip
        run: |
          mkdir $dllName
          cp -r publish/* $dllName/
          zip -r $dllName.zip $dllName

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${{ github.run_number }}"
          gh release create "$tag" "$dllName.zip" --target "$GITHUB_SHA" --title "Build ${{ github.run_number }}" --generate-notes
